    </header>
    <div class="container-fluid py-4" style="padding-top: 80px;">

        </div>
        <div class="container">
            <div class="col-8 col-sm-12 col-md-6 mx-auto">
                <div class="alert alert-danger alert-dismissible fade show small" role="alert">
                    <strong>Attention!</strong> This project has stopped downloading videos from Facebook

        <div class="d-flex justify-content-center mb-3">
            <form id="downloadForm" class="input-group w-75 w-md-50" onsubmit="return validateCaptcha(event)">

                <button type="submit" id="submitBtn" class="btn btn-get btn-sm">

            </form>
        </div>
        <div id="loading" class="text-center my-2" style="display: none;">

    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script type="text/javascript" src="./js/blank.js"></script>
    <script type="text/javascript" src="./js/autoketik.js"></script>
    <script type="text/javascript">
        const applyMode = (mode) => {
            if (mode === 'dark') {
                document.body.classList.add('bg-dark', 'text-white');
                document.body.classList.remove('bg-light', 'text-dark');
                toggleButton.innerHTML = '<i class="fas fa-sun"></i>';
            } else {
                document.body.classList.add('bg-light', 'text-dark');
                document.body.classList.remove('bg-dark', 'text-white');
                toggleButton.innerHTML = '<i class="fas fa-moon"></i>';
            }
            const elements = document.querySelectorAll('.text-light, .text-dark');
            elements.forEach(el => {
                if (mode === 'dark') {
                    el.classList.add('text-light');
                    el.classList.remove('text-dark');
                } else {
                    el.classList.add('text-dark');
                    el.classList.remove('text-light');
                }
            });
        };
        const toggleButton = document.createElement('button');
        toggleButton.classList.add('btn', 'btn-dark', 'btn-sm');
        toggleButton.style.position = 'fixed';
        toggleButton.style.bottom = '20px';
        toggleButton.style.right = '20px';
        toggleButton.innerHTML = '<i class="fas fa-moon"></i>';
        document.body.appendChild(toggleButton);
        const savedMode = localStorage.getItem('mode') || 'dark';
        applyMode(savedMode);
        toggleButton.addEventListener('click', () => {
            const newMode = document.body.classList.contains('bg-dark') ? 'white' : 'dark';
            localStorage.setItem('mode', newMode);
            applyMode(newMode);
        });

        function validateCaptcha(event) {
            const recaptchaResponse = grecaptcha.getResponse();
            if (recaptchaResponse.length == 0) {
                event.preventDefault();
                alert("Please verify that you are not a robot.");
            }
        }
    </script>
